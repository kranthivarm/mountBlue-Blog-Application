<div
        th:fragment="searchAndFilterFragment"
        style="background: #fff; padding: 20px; border: 1px solid #ddd !important; border-radius: 8px; margin-bottom: 20px;"
>
    <form th:action="@{/blogPost/allblogs}" method="get" >
        <div style="display: flex; gap: 10px; margin-bottom: 15px; border: none !important;">
            <input type="text" name="search"
                   placeholder="Search posts..."
                   th:value="${param.search}"
                   style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" />

            <button type="submit" style="padding: 10px 20px; cursor: pointer; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 4px;">
                Search
            </button>
        </div>

        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border: none !important; border-top: 1px solid #eee !important; padding-top: 15px;">

            <input type="text" name="authorName" placeholder="Author Id"
                   th:value="${param.authorName}"
                   style="padding: 8px; width: 100px; border: 1px solid #ccc; border-radius: 4px;" />

            <input type="text" name="tagNames" placeholder="Tag Id"
                   th:value="${param.tagNames}"
                   style="padding: 8px; width: 100px; border: 1px solid #ccc; border-radius: 4px;" />

            <div style="display: flex; gap: 5px; border: none !important;">
                <select name="sortField" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    <option value="publishedAt" th:selected="${param.sortField == 'publishedAt'}">Published</option>
                    <option value="createdAt" th:selected="${param.sortField == 'createdAt'}">Created</option>
                </select>

                <select name="order" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    <option value="asc" th:selected="${param.order == 'asc'}">ASC</option>
                    <option value="desc" th:selected="${param.order == 'desc'}">DESC</option>
                </select>
            </div>

            <div style="margin-left: auto; display: flex; gap: 10px; border: none !important;">
                <button type="submit" style="padding: 8px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    Apply Filters
                </button>

                <a th:href="@{/blogPost/allblogs}" style="text-decoration: none; color: #666; font-size: 13px; align-self: center;">
                    Clear All
                </a>
            </div>
        </div>
    </form>
</div>

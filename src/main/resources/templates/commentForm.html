<div
    th:fragment="CommentFormFragment(postId)"
>
    <form
       th:action="@{/comments/addComment/{id}(id=${postId})}"
       method="post"
       class="form-container"
    >
        <input type="hidden" name="postId" th:value="${postId}">

        <div class="form-group">
            <label >Name</label>
            <input type="text" name="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label >Email</label>
            <input type="email" name="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label >Comment</label>
            <textarea name="comment" rows="4" placeholder="Write your comment..."></textarea>
        </div>
<!--        <a th:href="@{/blogPost/">-->
<!--            <div class="addCommentButton">AddComment</div>-->
<!--        </a>-->
        <button type="submit" class="addCommentButton">AddComment</button>
    </form>
    <style>
        .form-container {
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 5px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .addCommentButton {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .addCommentButton:hover {
            background-color: #0056b3;
        }
    </style>
</div>

<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Blog Post</title>

    <style>
        /* 1. Center everything in the viewport */
        body {
            display: flex;
            justify-content: center; /* Horizontal center */
            align-items: center;     /* Vertical center */
            min-height: 100vh;       /* Full screen height */
            margin: 0;
            background-color: #f4f7f6;
            font-family: Arial, sans-serif;
        }

        /* 2. Style the form container */
        form {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px; /* Limits width on large screens */
        }

        /* 3. Stack labels and inputs vertically */
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't increase width */
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        /* 4. Style the update button */
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <form th:action="@{/blogPost/update}" th:object="${post}" method="post">
        <h2 style="text-align: center; margin-top: 0;">Update Post</h2>

        <input type="hidden" th:field="*{id}"/>

        <label>Title</label>
        <input type="text" th:field="*{title}" placeholder="Enter post title" />

        <label>Excerpt</label>
        <input type="text" th:field="*{excerpt}" placeholder="Short summary..." />

        <label>Content</label>
        <textarea th:field="*{content}" placeholder="Write your post here..."></textarea>

        <label>Author</label>
        <input type="text" th:field="*{author}" />

        <label>Tags</label>
        <input type="text" th:field="*{tags}" placeholder="e.g. java, spring, web" />

        <button type="submit">Update Post</button>
    </form>

</body>
</html>

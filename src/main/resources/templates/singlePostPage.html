<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Post</title>

    <style>
        .fixedButton{
            width: 75px;
            height: 40px;
            background-color: #007bff;
            color:white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 100px;
            padding:60px;
            background-color: #f9f9f9;
            color: #333;
        }
        .post-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/reloadToAvoidCache::freshPageScript}"></div>

<!-- HEADER BUTTONS -->
<div style="display: flex; justify-content: flex-end;position:fixed;top:10px;">
    <div sec:authorize="isAuthenticated()"
         th:replace="~{fragments/btnFragCreateNewPost::newPostBtnFragment}"></div>

    <div sec:authorize="isAnonymous()"
         th:replace="~{fragments/loginPageBtnFrag::loginPageBtnFrag}"></div>

    <div sec:authorize="isAuthenticated()"
         th:replace="~{fragments/logoutBtnFrag::logoutBtnFrag}"></div>
</div>

<br>

<!-- edit, delete-->
<div>
    <a th:if="${(isAdmin ?: false) or ((isUser ?: false) and (isOwner ?: false))}"
       th:href="@{/blogPost/deletePost/{id}(id=${post?.id})}"
       style="text-decoration:none; color:black;">
        <div class="fixedButton" style="position:absolute; top:100px; right:20px;">Delete</div>
    </a>

    <a th:if="${(isAdmin ?: false) or ((isUser ?: false) and (isOwner ?: false))}"
       th:href="@{/blogPost/updatePostForm/{id}(id=${post?.id})}"
       style="text-decoration:none; color:black;">
        <div class="fixedButton" style="position:absolute; top:100px; right:150px;">Edit</div>
    </a>
</div>

<!-- POST -->
<div class="post-container">

    <h1 th:text="${post?.id + '. ' + post?.title}"></h1>

    <div>
        <p><strong>Created At:</strong>
            <span th:text="${post?.createdAt != null ? #temporals.format(post.createdAt,'MMM dd, yyyy HH:mm') : 'N/A'}"></span>
        </p>

        <p><strong>Updated At:</strong>
            <span th:text="${post?.updatedAt != null ? #temporals.format(post.updatedAt,'MMM dd, yyyy HH:mm') : 'N/A'}"></span>
        </p>

        <p><strong>Published At:</strong>
            <span th:text="${post?.publishedAt != null ? #temporals.format(post.publishedAt,'MMM dd, yyyy HH:mm') : 'N/A'}"></span>
        </p>

        <p><strong>Author:</strong>
            <span th:text="${post?.author ?: 'Unknown'}"></span>
        </p>
    </div>

    <p><b>Tags:</b> <span th:text="${post?.tags ?: 'No Tags'}"></span></p>

    <div th:if="${post?.excerpt != null}"
         th:text="${post.excerpt}"></div>

    <div th:text="${post?.content ?: 'No Content'}"></div>

</div>

<!-- comments -->
<div>
    <h1>Comments</h1>

    <div th:replace="~{commentForm::CommentFormFragment(${post?.id})}"></div>

    <div th:each="comment : ${post?.comments ?: {}}"
         style="border:1px solid #ddd; padding:15px; margin-bottom:10px; border-radius:8px;">

        <!-- without edit-->
        <div th:if="${updateCommentId == null or (comment?.id != null and comment.id != updateCommentId)}">

            <div style="text-align:right;">
                <b th:text="${comment?.name ?: 'No name'}"></b>
                <span th:text="${comment?.email ?: 'No email'}"></span>
            </div>

            <p th:text="${comment?.comment ?: 'No Comment'}"></p>

            <span>
                Posted at:
                <span th:text="${comment?.createdAt != null ? #temporals.format(comment.createdAt,'MMM dd yyyy HH:mm') : 'N/A'}"></span>
            </span>

            <!-- cmt- delete,update -->
            <div>
                <span th:if="${(isAdmin ?: false) or ((isUser ?: false) and (isOwner ?: false))}">
                    <a th:href="@{/blogPost/{postId}(postId=${comment?.postId}, commentId=${comment?.id}, commentPage=${commentCurrentPage ?: 0})}">Edit</a>

                    <a th:href="@{/comments/deleteComment(commentId=${comment?.id},postId=${comment?.postId})}">Delete</a>
                </span>
            </div>

        </div>

        <!--cmnt edit -->
        <div th:if="${updateCommentId != null and comment?.id != null and comment.id == updateCommentId}">

            <form th:action="@{/comments/updateComment}" method="post">

                <input type="hidden" name="id" th:value="${comment?.id}" />
                <input type="hidden" name="postId" th:value="${comment?.postId}" />

                <input type="text" name="name" th:value="${comment?.name}" required />
                <input type="email" name="email" th:value="${comment?.email}" required />

                <textarea name="comment" th:text="${comment?.comment}" required></textarea>

                <button type="submit">Update</button>

                <a th:href="@{/blogPost/{id}(id=${comment?.postId})}">Cancel</a>

            </form>

        </div>

    </div>

    <!-- pagination -->
    <div th:if="${(commentTotalPages ?: 0) > 0}"
         style="display: flex; gap: 8px; justify-content: center; margin-top: 20px;">


        <a th:if="${(commentCurrentPage ?: 0) > 0}"
           th:href="@{/blogPost/{id}(id=${post?.id}, commentPage=${commentCurrentPage - 1})}"
           style="padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; text-decoration: none;">
            &laquo; Prev
        </a>


        <th:block th:each="i : ${#numbers.sequence(0, (commentTotalPages ?: 0) - 1)}">
            <a th:href="@{/blogPost/{id}(id=${post?.id}, commentPage=${i})}"
               th:text="${i + 1}"
               th:style="${i == (commentCurrentPage ?: 0)}
                ? 'padding:6px 12px; border:1px solid #3498db; border-radius:4px; background:#3498db; color:white; text-decoration:none;'
                : 'padding:6px 12px; border:1px solid #ccc; border-radius:4px; text-decoration:none;'">
            </a>
        </th:block>


        <a th:if="${(commentCurrentPage ?: 0) < ((commentTotalPages ?: 0) - 1)}"
           th:href="@{/blogPost/{id}(id=${post?.id}, commentPage=${commentCurrentPage + 1})}"
           style="padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; text-decoration: none;">
            Next &raquo;
        </a>

    </div>

    <p style="text-align: center; color: #666; margin-top: 8px;"
       th:text="'Page ' + ((commentCurrentPage ?: 0) + 1) + ' of ' + (commentTotalPages ?: 0)">
    </p>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Post</title>
    <style>
        .fixedButton{
             width:60px;
             height:40px;
             background-color:lightpink;
             border-radius:50%;
             border:2px solid black;
             display:flex;
             align-items:center;
             justify-content:center;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 100px;
            padding:60px;
            background-color: #f9f9f9;
            color: #333;
        }
        .post-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .post-meta {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 20px;
            padding:10px;
        }
        .post-meta p {
            margin: 5px 0;
        }
        .post-author {
            font-weight: bold;
            color: #2c3e50;
        }
        .post-excerpt {
            font-style: italic;
            color: #555;
            background-color: #f0f0f0;
            padding: 15px;
            border-left: 4px solid #3498db;
            margin: 20px 0;
        }
        .post-content {
            line-height: 1.6;
            text-align: justify;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body >
<!--    delete button  -->
    <div style="
         position:absolute;
         top:10px;
         right:20px;
    " class="fixedButton">
        <a
           th:href="@{/blogPost/deletePost/{id}(id=${post.id})}"
           style="text-decoration:none; color:black;"
        >Delete</a>
    </div>
<!--    updatebutton-->
    <div class="fixedButton" style="
             position:absolute;
             top:10px;
             right:150px;
        ">
        <a
            th:href="@{/blogPost/updatePostForm/{id}(id=${post.id})}"
            style="text-decoration:none; color:black;"
        >Edit</a>
    </div>

    <div class="post-container">
        <h1 th:text="${post?.id + '. ' + post?.title}">Post Title</h1>

        <div class="post-meta">
            <p><strong>Created At:</strong> <span th:text="${#temporals.format(post?.createdAt, 'MMM dd, yyyy HH:mm')}">Created Date</span></p>
            <p><strong>Updated At:</strong> <span th:text="${#temporals.format(post?.updatedAt, 'MMM dd, yyyy HH:mm')}">Updated Date</span></p>
            <p><strong>Published At:</strong> <span th:text="${#temporals.format(post?.publishedAt, 'MMM dd, yyyy HH:mm')}">Created Date</span></p>
            <p><strong>Author:</strong> <span class="post-author" th:text="${post?.author}">Author Name</span></p>
        </div>

        <div>
            <p>
                <b>Tags</b>
                <span th:text="${post?.tags ?: 'No Tags'}"></span>
            </p>
        </div>

        <div class="post-excerpt" th:text="${post?.excerpt ?: 'No Summary'}" th:if="${post?.excerpt != null}">Post excerpt goes here...</div>

        <div class="post-content" th:text="${post?.content ?: 'No Content'}">Full post content goes here...</div>

    <!--    <a th:href="@{/blogPost/allblogs}" class="back-link">← Back to All Posts</a>-->
    </div>


    <div>
        <h1>Comments</h1>
<!--        <div>comment form</div>-->
        <div th:replace="~{commentForm::CommentFormFragment(${post.id})}"></div>
        <div> all comments on post</div>
<!--        <div th:if="${post == null or #lists.isEmpty(post.comments)}">-->
<!--            No comments yet-->
<!--        </div>-->
        <div th:each="comment: ${post?.comments}"
             style="border:1px solid #ddd; padding:7px; margin-bottom:5px; border-radius:8px;">
            <p>
                <b th:text="${comment?.name ?: 'No name'}">Name</b>
                <span th:text="${comment?.email ?: 'No email'}">email</span>
            </p>
            <p th:text="${comment?.comment ?: 'NoComment'}">Comment text</p>
            <p style="font-size:12px; color:gray;">
                Posted at
                <span th:text="${#temporals.format(comment.createdAt,'MMM dd yyyy HH:mm')}"></span>
            </p>
        </div>
    </div>
</body>
</html>

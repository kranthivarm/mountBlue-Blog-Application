<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 360px;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
        input {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; box-sizing: border-box; font-size: 14px;
        }
        .btn {
            width: 100%; padding: 11px; background: #3498db; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 15px;
        }
        .btn:hover { background: #2980b9; }
        .msg-error   { color: #e74c3c; font-size: 13px; margin-bottom: 14px; text-align: center; }
        .msg-success { color: #27ae60; font-size: 13px; margin-bottom: 14px; text-align: center; }
        .footer { text-align: center; margin-top: 16px; font-size: 13px; }
        .footer a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>

    <p class="msg-error"   th:if="${error}"   th:text="${error}"></p>
    <p class="msg-success" th:if="${message}" th:text="${message}"></p>
    <p class="msg-success" th:if="${param.registered}">Registered successfully. Please login.</p>

    <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="username" placeholder="Enter email" required />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn">Login</button>
    </form>

    <div class="footer">
        Don't have an account? <a th:href="@{/auth/signup}">signup</a>
    </div>
</div>
</body>
</html>

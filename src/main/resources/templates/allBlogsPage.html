<!doctype html>
<html
      lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        div{
<!--            border: 4x solid blue;-->
        }
        td{
            padding:7px;
        }
    </style>
</head>
<body>
    <div th:replace="~{searchAndFiltersDiv::searchAndFilterFragment}"></div>

    <h1>All Posts<span></span></h1>
<!--    <div th:replace="~{sortButton::sortingButton}"></div>-->
    <table border="1" >
        <thead>
        <tr style="background-color: #3498db;">
            <th>Title</th>
            <th>Excerpt</th>
            <th>Author</th>
            <th>Tags</th>
            <th>Published At</th>
            <th>Update</th>
            <th style="color:red">Delete</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${allPosts}">
            <td th:text="${post?.title ?: 'No Title'}">Title</td>
            <td>
                <a
                   th:href="@{/blogPost/{id}(id=${post.id})}"
                   th:text="${post?.excerpt}"
                ></a>
            </td>
            <td th:text="${post?.author ?: 'No Author'}">Author</td>
            <td th:text="${post?.tags ?: 'No Tags'}">Tags</td>
            <td th:text="${post?.publishedAt ?: 'No Date'}">Published At</td>
            <td>
                <a
                  th:if="${isAdmin or (isUser and post.author==currentUserEmail)}"
                  th:href="@{/blogPost/updatePostForm/{id}(id=${post.id})}"
                >UpdateThispost
                </a>
            </td>
            <td>
                <a
                   th:if="${isAdmin or (isUser and post.author == currentUserEmail)}"
                   th:href="@{/blogPost/deletePost/{id}(id=${post.id})}"
                >DeleteThisBlog</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <div th:if="${totalPages>0}" style="display: flex; gap: 8px; justify-content: center; margin-top: 20px;">

        <!-- Previous -->
        <a th:if="${currentPage > 0}"
           th:href="@{/blogPost/allblogs(page=${currentPage - 1}, search=${search}, authorName=${authorName}, tagNames=${tagNames}, sortField=${sortField}, order=${order}, startDate=${startDate}, endDate=${endDate})}"
           style="padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; text-decoration: none;">
            &laquo; Prev
        </a>

        <!-- Page numbers -->
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/blogPost/allblogs(page=${i}, search=${search}, authorName=${authorName}, tagNames=${tagNames}, sortField=${sortField}, order=${order}, startDate=${startDate}, endDate=${endDate})}"
               th:text="${i + 1}"
               th:style="${i == currentPage} ? 'padding:6px 12px; border:1px solid #3498db; border-radius:4px; background:#3498db; color:white; text-decoration:none;'
                                        : 'padding:6px 12px; border:1px solid #ccc; border-radius:4px; text-decoration:none;'">
            </a>
        </th:block>

        <!-- Next -->
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/blogPost/allblogs(page=${currentPage + 1}, search=${search}, authorName=${authorName}, tagNames=${tagNames}, sortField=${sortField}, order=${order}, startDate=${startDate}, endDate=${endDate})}"
           style="padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; text-decoration: none;">
            Next &raquo;
        </a>

    </div>

    <!-- Info -->
    <p style="text-align: center; color: #666; margin-top: 8px;">
        <span th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages} + ' (' + ${totalItems} + ' posts)'"></span>
    </p>
</body>
</html>
